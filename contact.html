<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🌍 Discover Kenya</h1>
            <p>Experience the Magic of East Africa</p>
        </div>
    </header>

    <nav>
        <div class="container">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="destinations.html">Destinations</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="contact">
            <div class="container">
                <h2>Get in Touch</h2>
                <form action="#" method="post">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" required>
                    
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                    
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                    
                    <button type="submit">Send Message</button>
                </form>
                
                <p class="contact-info">📍 Nairobi, Kenya | 📧 info@discoverkenya.ke | 📞 +254 119242450</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Discover Kenya Tourism Project </p>
            <p>Stephanie | Nairobi, Kenya</p>
        </div>
    </footer>
</body>
</html>
